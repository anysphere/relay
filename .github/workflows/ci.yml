name: CI

# Anysphere-native CI for the Cursor fork of sentry-relay.
#
# This replaces the 935-line upstream `ci.yml`, which referenced third-party actions
# (`webfactory/ssh-agent`, `dorny/paths-filter`) that are not on the org GitHub Actions
# allowlist. All third-party actions below are pinned by full SHA and match the pins
# used in anysphere/everysphere. Upstream's publish-to-sentry-infrastructure jobs
# (build-internal, publish-to-ar-internal/gcr, gocd-artifacts, sentry-relay-integration,
# self-hosted-end-to-end) are dropped entirely — they require Sentry credentials and are
# irrelevant to this fork's purpose.
#
# What runs:
#   - lint:    cargo fmt + cargo clippy (with the `fanout-http` feature)
#   - test:    cargo test on the workspace (with the `fanout-http` feature)
#   - docker:  build cursor.Dockerfile on every PR; additionally push to ECR on
#              merges to master, tagged with the commit SHA.

on:
  push:
    branches: [master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read
  id-token: write

env:
  CARGO_TERM_COLOR: always
  RELAY_CARGO_ARGS: "--locked"
  ECR_REGISTRY: "946207870883.dkr.ecr.us-east-1.amazonaws.com"
  ECR_REPOSITORY: "cursor-sentry-relay"
  AWS_REGION: "us-east-1"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-relay-cargo-lint-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-relay-cargo-lint-

      - name: cargo fmt
        run: cargo fmt --all -- --check

      - name: cargo clippy
        # `fanout-http` is on by default for this fork (see relay-server/Cargo.toml).
        run: cargo clippy --workspace --all-targets --no-deps -- -D warnings

  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache cargo
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-relay-cargo-test-${{ hashFiles('Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-relay-cargo-test-

      - name: cargo test
        # `fanout-http` is on by default for this fork (see relay-server/Cargo.toml).
        run: cargo test --workspace --locked

  docker:
    name: Docker
    needs: [lint, test]
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          submodules: recursive

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Configure AWS credentials
        # Uses the dedicated RelayCIRole (least-privilege: OIDC trust for
        # repo:anysphere/relay:*; only ECR push/pull on cursor-sentry-relay),
        # NOT the broader AWS_EVERYSPHERE_CI_ROLE. Provisioned by everysphere
        # PR #11272. Store the ARN in the `AWS_RELAY_CI_ROLE` repo secret.
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4
        with:
          role-to-assume: ${{ secrets.AWS_RELAY_CI_ROLE }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        uses: aws-actions/amazon-ecr-login@f2e9fc6c2b355c1890b65e6f6f0e2ac3e6e22f78 # v2
        with:
          registries: "946207870883"

      - name: Build (and push on master)
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          file: cursor.Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: false
          sbom: false
